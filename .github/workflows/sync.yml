name: Upstream Sync Config

on:
  schedule:
    - cron: "0 */6 * * *" # run every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync_config:
    name: Sync config.json from upstream
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Fetch config.json from upstream
        run: |
          curl -sL "https://raw.githubusercontent.com/senshinya/MoonTV/main/config.json" -o upstream_config.json

      - name: Check if config.json changed
        id: check
        run: |
          if ! diff -q config.json upstream_config.json > /dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated config.json
        if: steps.check.outputs.changed == 'true'
        run: |
          cp upstream_config.json config.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json
          git commit -m "chore: sync config.json from upstream"
          git push

      - name: Cleanup
        run: rm -f upstream_config.json

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
